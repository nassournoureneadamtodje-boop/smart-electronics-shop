<!DOCTYPE html>
<html>
<head>
  <title>Checkout - Smart Electronics Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Checkout</h1>
  <p>Complete your order securely</p>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="products.html">Products</a>
  <a href="about.html">About Us</a>
  <a href="contact.html">Contact</a>
  <a href="cart.html">Cart <span id="cart-count">0</span></a>
  <a href="checkout.html">Checkout</a>
</nav>

<div class="container">
  <h2>Order Summary</h2>

  <div class="summary-box">
    <div id="order-summary"></div>
    <h3>Total: <span id="checkout-total">0 RWF</span></h3>
  </div>

  <h2>Customer Details</h2>

  <form id="checkout-form">
    <label>Full Name</label>
    <input type="text" id="name" placeholder="Enter your full name" required>

    <label>Phone Number</label>
    <input type="text" id="phone" placeholder="0793226597" required>

    <label>Email Address</label>
    <input type="email" id="email" placeholder="Enter your email address" required>

    <label>Delivery Address</label>
    <textarea id="address" placeholder="Enter your delivery address" required></textarea>

    <label>Payment Method</label>
    <select id="payment" required>
      <option value="">Select payment method</option>
      <option value="Pay on Delivery">Pay on Delivery</option>
      <option value="MTN Mobile Money">MTN Mobile Money</option>
      <option value="Airtel Money">Airtel Money</option>
      <option value="Bank Transfer">Bank Transfer</option>
      <option value="Visa / Mastercard">Visa / Mastercard</option>
    </select>

    <button type="submit" class="btn">Place Order</button>
  </form>
</div>

<footer>
  <p><strong>Smart Electronics Shop</strong></p>
  <p>Kigali, Rwanda | Phone: 0793226597 | Email: todjenassournourene@gmail.com</p>
  <p>&copy; 2026 Smart Electronics Shop</p>
</footer>

<script src="app.js"></script>
</body>
</html>
